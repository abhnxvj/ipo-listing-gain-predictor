# Render Blueprint — deploy this repo as a free web service.
# In Render: New -> Blueprint -> connect this GitHub repo. Render reads this file.
services:
  - type: web
    name: ipo-listing-gain-predictor
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.1"
